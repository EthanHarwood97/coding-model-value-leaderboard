name: Update Leaderboard Data

on:
  # Daily refresh at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      model:
        description: "Update only this model (optional)"
        required: false
        type: string

  # Auto-run when data file changes via PR (sanity check)
  pull_request:
    paths:
      - "data/models.json"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        id: update
        env:
          # Sources: OpenRouter (pricing, AA index), Aider (polyglot coding), HuggingFace (SWE-bench)
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -n "${{ inputs.model }}" ]; then
            python scripts/update.py --model "${{ inputs.model }}"
          else
            python scripts/update.py
          fi

      - name: Show diff
        if: always()
        run: |
          git --no-pager diff data/models.json | head -200 || echo "No changes"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update model prices & benchmarks ($(date -u +%Y-%m-%d))"
            git push
          fi